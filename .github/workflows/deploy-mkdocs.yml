name: Deploy MkDocs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build public site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS assets
        run: git lfs pull

      - name: Materialize MkDocs sources
        run: |
          rm -rf .site-docs/README.md .site-docs/PROGRAM.md .site-docs/GUIDE.md .site-docs/ROUTINES.md .site-docs/SITE.md
          rm -rf .site-docs/core .site-docs/electives .site-docs/capstone .site-docs/notes .site-docs/resources
          rm -rf .site-docs/progress .site-docs/meta .site-docs/rpl .site-docs/scripts .site-docs/udacity_mba_brochure.pdf
          mkdir -p .site-docs
          cp README.md PROGRAM.md GUIDE.md ROUTINES.md SITE.md .site-docs/
          cp -R core electives capstone notes resources progress meta rpl scripts .site-docs/
          cp udacity_mba_brochure.pdf .site-docs/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --locked

      - name: Build public MkDocs site
        run: uv run mkdocs build -f mkdocs-public.yml --clean

      - name: Verify rendered assets are not Git LFS pointers
        run: |
          if grep -RIl "version https://git-lfs.github.com/spec/v1" .site-build/public; then
            echo "One or more published assets are still Git LFS pointer files."
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site-build/public

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
