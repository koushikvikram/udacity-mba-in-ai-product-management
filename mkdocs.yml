site_name: MBA in AI Product Management
site_description: Markdown-first study site for the Udacity MBA in AI Product Management workspace.
docs_dir: .site-docs
site_dir: .site-build/local
strict: false

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: info
    unrecognized_links: info

nav:
  - Home: README.md
  - Program:
      - Overview: PROGRAM.md
      - Guide: GUIDE.md
      - Routines: ROUTINES.md
      - Static Site Layer: SITE.md
  - Progress:
      - Tracker: progress/TRACKER.md
      - Study Log: progress/study-log.md
